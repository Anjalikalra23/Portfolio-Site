<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anjali Kalra | Portfolio</title>

  <style>
    :root {
      --bg1: #0d0d0d;
      --bg2: #111;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8633a;
      --muted: #aaa;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg1);
      color: white;
    }

    header {
      text-align: center;
      padding: 2rem;
      border-bottom: 1px solid var(--border);
    }

    section {
      padding: 2rem;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      margin-bottom: 1rem;
    }

    .video-section {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .video-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: #0d0d0d;
      position: relative;
      overflow: hidden;
    }

    .video-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(232,99,58,0.02) 40px,
        rgba(232,99,58,0.02) 80px
      );
      pointer-events: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: relative;
      z-index: 2;
    }

    .video-info {
      padding: 1.5rem;
    }

    .blog {
      background: var(--bg3);
      padding: 1.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

<header>
  <h1>Anjali Kalra</h1>
  <p>Applied Data Science | Syracuse University</p>
</header>

<section>
  <h2>Overview</h2>
  <p>
    I am a graduate student in Applied Data Science with experience in machine learning,
    data analytics, and AI-driven applications.
  </p>
</section>

<section id="video">
  <h2>Project Presentation</h2>

  <div class="video-section">
    <div class="video-placeholder">
      <iframe 
        src="https://drive.google.com/file/d/1WQJlZbT4hKMlg-dqMO9YLU7TUMD9xDeZ/preview"
        allow="autoplay"
        allowfullscreen>
      </iframe>
    </div>

    <div class="video-info">
      <h3>Recorded Presentation</h3>
      <p>Demonstration of my project.</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Anjali Kalra</p>
</footer>

</body>
</html>
